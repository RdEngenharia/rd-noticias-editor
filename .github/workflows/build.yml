name: Compilar EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Gerar ícone
        run: python make_icon.py

      - name: Compilar EXE
        run: python -m PyInstaller watermark.spec

      - name: Remover release anterior (latest)
        run: |
          gh release delete latest --yes 2>$null
          git push origin :refs/tags/latest 2>$null
          exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar nova versão
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Versão Mais Recente"
          body: |
            Compilado automaticamente a partir do último código enviado.

            **Download:** clique em `RD-Noticias-Editor.exe` abaixo.
          prerelease: false
          make_latest: true
          files: dist/RD-Noticias-Editor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
